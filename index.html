<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missão Secreta</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#0f0f0f,#1c001c);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:100%;
max-width:420px;
height:100vh;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,100,0.2);
animation:fade .5s ease;
}

h1{
font-size:22px;
margin-bottom:10px;
}

p{
font-size:15px;
opacity:.8;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
outline:none;
background:#2a2a2a;
color:white;
margin-bottom:15px;
font-size:16px;
text-align:center;
}

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#ff0066;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.97);
}

.progress{
height:6px;
background:#2a2a2a;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#ff0066;
transition:.4s;
}

img{
width:100%;
border-radius:18px;
margin-top:15px;
box-shadow:0 0 20px rgba(255,0,100,.5);
}

.error{
color:#ff4d6d;
font-size:14px;
margin-top:10px;
}

@keyframes fade{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">
<div class="card" id="appContent">

<h1>🔒 Área Privada</h1>
<p>Digite a senha para acessar.</p>
<input type="password" id="senha" placeholder="Senha">
<button onclick="verificarSenha()">Entrar</button>
<div class="error" id="erro"></div>

</div>
</div>

<script>

const senhaCorreta = "amor2024"; // ALTERE AQUI

let fase = 0;

const fases = [
{
pergunta:"Qual foi o lugar do nosso primeiro encontro?",
resposta:"cinema"
},
{
pergunta:"Quem disse 'eu te amo' primeiro?",
resposta:"eu"
},
{
pergunta:"Qual música é a nossa música?",
resposta:"nossa musica"
}
];

function verificarSenha(){
let senha = document.getElementById("senha").value;

if(senha === senhaCorreta){
fase = 0;
carregarFase();
}else{
document.getElementById("erro").innerText = "Senha incorreta.";
}
}

function carregarFase(){
const app = document.getElementById("appContent");

if(fase < fases.length){

app.innerHTML = `
<div class="progress">
<div class="progress-bar" style="width:${(fase/fases.length)*100}%"></div>
</div>
<h1>Fase ${fase+1}</h1>
<p>${fases[fase].pergunta}</p>
<input id="resposta" placeholder="Digite sua resposta">
<button onclick="verificarResposta()">Responder</button>
<div class="error" id="erroResposta"></div>
`;

}else{
app.innerHTML = `
<div class="progress">
<div class="progress-bar" style="width:100%"></div>
</div>
<h1>Missão Completa ❤️</h1>
<p>Você desbloqueou o nível final do nosso amor.</p>
<img src="sua-foto.jpg">
<p style="margin-top:15px;font-weight:bold;">
Eu escolheria você em todas as versões da minha vida.
</p>
`;
}
}

function verificarResposta(){
let resposta = document.getElementById("resposta").value.toLowerCase().trim();

if(resposta === fases[fase].resposta){
fase++;
carregarFase();
}else{
document.getElementById("erroResposta").innerText = "Resposta errada 😏 tenta de novo.";
}
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Secreto</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.app{
width:100%;
max-width:430px;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
width:100%;
background:#111;
padding:28px;
border-radius:28px;
box-shadow:0 20px 40px rgba(255,0,100,.15);
animation:fade .4s ease;
text-align:center;
position:relative;
}

h1{font-size:22px;margin-bottom:10px;}
p{font-size:15px;opacity:.8;margin-bottom:20px;}

button{
width:100%;
padding:14px;
border-radius:16px;
border:none;
background:#ff0066;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
margin-bottom:10px;
}

.secondary{
background:#2a2a2a;
width:120px;
padding:10px;
font-size:14px;
margin:10px auto 0 auto;
display:block;
position:relative;
}

.ring{
font-size:90px;
cursor:pointer;
transition:.4s;
display:inline-block;
}

.ring.girar{
animation:giro 1s linear infinite;
}

@keyframes giro{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.fade{
animation:fade .4s ease;
}

img{
width:100%;
border-radius:20px;
margin-top:15px;
box-shadow:0 10px 25px rgba(255,0,100,.4);
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">
<div class="card fade" id="app">

<h1>💘 Pergunta Final</h1>
<p>Você aceita namorar comigo oficialmente?</p>
<button onclick="mostrarAlianca()">SIM ❤️</button>
<button class="secondary" id="naoBtn">NÃO</button>

</div>
</div>

<script>

let cliques = 0;

function mostrarAlianca(){
document.getElementById("app").innerHTML = `
<h1>💍 Selando o destino...</h1>
<p>Clique 10 vezes na aliança</p>
<div class="ring girar" id="ring" onclick="clicar()">💍</div>
<p id="contador">0 / 10</p>
`;
}

function clicar(){
cliques++;

if(navigator.vibrate){
navigator.vibrate(80);
}

document.getElementById("contador").innerText = cliques + " / 10";

let ring = document.getElementById("ring");

/* Evolução visual */
if(cliques >= 3){
ring.innerHTML = "💍💍";
}
if(cliques >= 6){
ring.innerHTML = "💍❤️💍";
}
if(cliques >= 9){
ring.innerHTML = "💞";
}

if(cliques === 10){

ring.classList.remove("girar");

document.getElementById("app").innerHTML = `
<h1 style="font-size:26px;">💞</h1>
<h1>Tem certeza?</h1>
<p style="opacity:.9;margin-top:10px;">
Não é só um clique... é pra vida inteira.
</p>
<button onclick="final()">Tenho ❤️</button>
`;

}
}

function final(){
if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

document.getElementById("app").innerHTML = `
<h1>❤️ Pedido Aceito</h1>
<p>Você desbloqueou o melhor nível da minha vida.</p>
<img src="sua-foto.jpg">
<p style="margin-top:15px;font-weight:600;">
Eu escolheria você em todas as versões da minha vida.
</p>
`;
}

/* Botão NÃO fugindo */
const btn = document.getElementById("naoBtn");
btn.addEventListener("touchstart", fugir);
btn.addEventListener("mouseover", fugir);

function fugir(){
btn.style.position="absolute";
btn.style.left=Math.random()*60+"%";
btn.style.top=Math.random()*60+"%";
}

</script>

</body>
</html>

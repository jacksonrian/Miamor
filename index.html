<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Missão Secreta ❤️</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to bottom,#000000,#1a001a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

.container{
max-width:400px;
padding:20px;
animation:fade 0.8s;
}

input{
padding:10px;
border-radius:20px;
border:none;
text-align:center;
margin-top:15px;
}

button{
padding:12px 25px;
background:#ff0066;
border:none;
color:white;
border-radius:25px;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

button:hover{
background:#ff3385;
transform:scale(1.1);
}

img{
width:280px;
border-radius:20px;
margin-top:20px;
box-shadow:0px 0px 20px #ff0066;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.heart{
position:absolute;
color:#ff0066;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="container" id="game">
<h1>🔒 Área Secreta</h1>
<p>Digite a senha para começar a missão...</p>
<input type="password" id="senha" placeholder="Digite a senha">
<br>
<button onclick="checkSenha()">Entrar</button>
<p id="erro" style="color:red;"></p>
</div>

<script>

const senhaCorreta = "amor2024"; // MUDE AQUI A SENHA

let fase = 0;

function checkSenha(){
let senha = document.getElementById("senha").value;
if(senha === senhaCorreta){
startGame();
}else{
document.getElementById("erro").innerText = "Senha incorreta... tente novamente ❤️";
}
}

function startGame(){
nextFase();
}

function nextFase(){
const game = document.getElementById("game");
game.style.animation="none";
void game.offsetWidth;
game.style.animation="fade 0.8s";

const fases = [

`
<h1>🎮 Fase 1</h1>
<p>Qual foi o lugar do nosso primeiro encontro?</p>
<input id="resposta">
<br>
<button onclick="verificarResposta('resposta','cinema')">Responder</button>
`,

`
<h1>🎮 Fase 2</h1>
<p>Quem disse "eu te amo" primeiro?</p>
<input id="resposta">
<br>
<button onclick="verificarResposta('resposta','eu')">Responder</button>
`,

`
<h1>🎮 Fase 3</h1>
<p>Qual música lembra a gente?</p>
<input id="resposta">
<br>
<button onclick="verificarResposta('resposta','nossa musica')">Responder</button>
`,

`
<h1>❤️ Missão Completa</h1>
<p>Você zerou o jogo do nosso amor.</p>
<img src="sua-foto.jpg">
<h2>Eu escolheria você em todas as vidas.</h2>
`
];

game.innerHTML = fases[fase];
}

function verificarResposta(id, correta){
let resposta = document.getElementById(id).value.toLowerCase();

if(resposta === correta){
fase++;
nextFase();
}else{
alert("Resposta errada 😏 tenta de novo!");
}
}

// Corações caindo
function createHeart(){
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Secreto</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.app{
width:100%;
max-width:430px;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
}

.card{
width:100%;
background:#111;
padding:28px;
border-radius:28px;
box-shadow:0 20px 40px rgba(255,0,100,.15);
animation:fade .4s ease;
text-align:center;
position:relative;
}

h1{font-size:22px;margin-bottom:10px;}
p{font-size:15px;opacity:.8;margin-bottom:20px;}

input{
width:100%;
padding:14px;
border-radius:16px;
border:none;
background:#1f1f1f;
color:#fff;
font-size:16px;
margin-bottom:15px;
text-align:center;
}

button{
width:100%;
padding:14px;
border-radius:16px;
border:none;
background:#ff0066;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
margin-bottom:10px;
}

button:active{transform:scale(.96);}

.secondary{
background:#2a2a2a;
width:120px;
padding:10px;
font-size:14px;
margin:10px auto 0 auto;
display:block;
position:relative;
}

.progress{
height:5px;
background:#1f1f1f;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0066;
transition:.4s;
}

.ring{
font-size:90px;
cursor:pointer;
transition:.4s;
display:inline-block;
}

.ring.spin{
animation:spin 2s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

img{
width:100%;
border-radius:20px;
margin-top:15px;
box-shadow:0 10px 25px rgba(255,0,100,.4);
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">
<div class="card" id="app"></div>
</div>

<script>

const senhaCorreta = "amor2024"; // ALTERE
let fase = -1;
let cliques = 0;

const perguntas = [
"Qual foi nosso primeiro encontro?",
"Complete: Eu te ____",
"Digite a data do nosso início (ex: 10/05/2024)",
"Qual comida eu mais gosto?",
"Quem é mais ciumento? (eu ou você)",
"Qual apelido carinhoso eu te chamo?"
];

const respostas = [
"cinema",
"amo",
"10/05/2024",
"pizza",
"eu",
"amor"
];

iniciar();

function iniciar(){
document.getElementById("app").innerHTML = `
<h1>🔒 Área Privada</h1>
<p>Digite a senha para acessar.</p>
<input type="password" id="senha">
<button onclick="login()">Entrar</button>
<p id="erro" style="color:#ff4d6d;"></p>
`;
}

function login(){
let s = document.getElementById("senha").value;
if(s === senhaCorreta){
fase = 0;
carregar();
}else{
document.getElementById("erro").innerText="Senha incorreta.";
}
}

function carregar(){

if(fase < perguntas.length){

let progresso = (fase/perguntas.length)*100;

document.getElementById("app").innerHTML = `
<div class="progress"><div class="bar" style="width:${progresso}%"></div></div>
<h1>🎮 Jogo ${fase+1}</h1>
<p>${perguntas[fase]}</p>
<input id="r">
<button onclick="verificar()">Responder</button>
`;

}else if(fase === perguntas.length){

document.getElementById("app").innerHTML = `
<h1>💘 Pergunta Final</h1>
<p>Você aceita namorar comigo oficialmente?</p>
<button onclick="mostrarAlianca()">SIM ❤️</button>
<button class="secondary" id="naoBtn">NÃO</button>
`;

moverBotao();

}

else if(fase === 100){

document.getElementById("app").innerHTML = `
<h1>💍 Selando o destino...</h1>
<p>Clique 10 vezes na aliança</p>
<div class="ring spin" id="ring" onclick="clicar()">💍</div>
<p id="contador">0 / 10</p>
`;

}

else{

document.getElementById("app").innerHTML = `
<h1>❤️ Pedido Aceito</h1>
<p>Você desbloqueou o melhor nível da minha vida.</p>
<img src="DE430CAF-0E96-48E9-B362-C36F057FDFAA.jpeg">
<p style="margin-top:15px;font-weight:600;">
Eu escolheria você em todas as versões da minha vida.
</p>
`;

}
}

function verificar(){
let r = document.getElementById("r").value.toLowerCase().trim();
if(r === respostas[fase]){
fase++;
carregar();
}else{
alert("Resposta errada 😏 tenta de novo.");
}
}

function mostrarAlianca(){
fase = 100;
carregar();
}

function clicar(){
cliques++;

if(navigator.vibrate){
navigator.vibrate(70);
}

document.getElementById("contador").innerText = cliques + " / 10";

let ring = document.getElementById("ring");

if(cliques >= 3) ring.innerHTML="💍💍";
if(cliques >= 6) ring.innerHTML="💍❤️💍";
if(cliques >= 9) ring.innerHTML="💞";

if(cliques === 10){

ring.classList.remove("spin");

document.getElementById("app").innerHTML = `
<h1>💞</h1>
<h1>Tem certeza?</h1>
<p>Não é só um clique... é pra vida inteira.</p>
<button onclick="final()">Tenho ❤️</button>
`;

} 
}

function final(){

if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

fase = 999;
carregar();
}

function moverBotao(){
const btn = document.getElementById("naoBtn");

btn.addEventListener("touchstart", fugir);
btn.addEventListener("mouseover", fugir);

function fugir(){
btn.style.position="absolute";
btn.style.left=Math.random()*60+"%";
btn.style.top=Math.random()*60+"%";
}
}

</script>

</body>
</html>
